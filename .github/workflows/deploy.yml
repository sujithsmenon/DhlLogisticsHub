name: Deploy to AWS ECS

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}      # manual button in the Actions tab

# Concurrency: cancel any in-flight deploy on the same ref when a new push lands.
# Avoids racing two ECS UpdateService calls against each other.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # let an in-progress deploy finish — interrupting mid-rollout is risky

permissions:
  id-token: write     # OIDC token request
  contents: read

env:
  AWS_REGION:     ap-south-1
  ECR_REPOSITORY: dhl-logistics/web
  ECS_CLUSTER:    dhl-logistics-prod-cluster
  ECS_SERVICE:    dhl-logistics-prod-web
  ECS_FAMILY:     dhl-logistics-prod-web
  CONTAINER_NAME: web

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHA_TAG=sha-${GITHUB_SHA::7}
          echo "sha_tag=$SHA_TAG"                                                 >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "latest_uri=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"  >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image_uri }}
            ${{ steps.tags.outputs.latest_uri }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false      # avoids dangling untagged image entries in ECR

      - name: Render new task definition
        id: render
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_FAMILY}" \
            --query 'taskDefinition' \
            --output json > taskdef.json

          # Strip fields that can't go into RegisterTaskDefinition.
          jq 'del(
                .taskDefinitionArn, .revision, .status,
                .requiresAttributes, .compatibilities,
                .registeredAt, .registeredBy
              )
              | .containerDefinitions[0].image = "${{ steps.tags.outputs.image_uri }}"' \
            taskdef.json > new-taskdef.json

      - name: Register new task definition
        id: register
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "New task definition: $NEW_ARN"
          echo "task_def_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}" \
            --force-new-deployment \
            > /dev/null

      - name: Wait for service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"
          echo "✅ Deploy complete — image ${{ steps.tags.outputs.sha_tag }} is live"
